version: "3.9"

services:
  # ──────────────────────────────────────
  # Agent — scale lên 3 instances
  # ──────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - agent_net

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent_net

  # ──────────────────────────────────────
  # Nginx — Load Balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge